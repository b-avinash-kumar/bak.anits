<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Fundamentals Quiz</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{text-align:center;color:#1f4e79}
.option{display:block;border:1px solid #ccc;padding:12px;margin:8px 0;border-radius:6px;cursor:pointer}
.option input{margin-right:10px;display:inline-block;vertical-align:middle}
.feedback{margin-top:15px;font-weight:bold}
button{padding:10px 16px;border:none;border-radius:6px;cursor:pointer}
#submitBtn{background:#2563eb;color:white}
#nextBtn{background:#16a34a;color:white;display:none}
</style>
</head>
<body>
<div class="container">
<h1>HTML Fundamentals Quiz</h1>
<p>Select an answer and click Submit.</p>
<div id="progress"></div>
<h2 id="question"></h2>
<div id="options"></div>
<div id="feedback" class="feedback"></div>
<button id="submitBtn">Submit</button>
<button id="nextBtn">Next</button>
<div id="result"></div>
</div>

<script>
const quiz=[
{q:"Which tag creates the largest heading?",o:["<heading>","<head>","<h1>","<h6>"],a:2},
{q:"Which element contains visible page content?",o:["<title>","<body>","<meta>","<head>"],a:1},
{q:"Which attribute specifies a hyperlink destination?",o:["src","href","url","link"],a:1},
{q:"Which semantic element is used for navigation?",o:["<nav>","<aside>","<section>","<article>"],a:0},
{q:"Which tag displays an image?",o:["<image>","<picture>","<img>","<src>"],a:2}
];
let current=0,score=0;

function load(){
document.getElementById("progress").innerText=`Question ${current+1} of ${quiz.length}`;
document.getElementById("question").textContent=quiz[current].q;
let html="";
quiz[current].o.forEach((op,i)=>{
html+=`<label class="option"><input type="radio" name="ans" value="${i}"> ${op.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</label>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedback").innerHTML="";
document.getElementById("nextBtn").style.display="none";
document.getElementById("submitBtn").style.display="inline-block";
}

document.getElementById("submitBtn").onclick=function(){
const s=document.querySelector('input[name="ans"]:checked');
if(!s){alert("Select an answer");return;}
let v=parseInt(s.value);
if(v===quiz[current].a){
score++;
document.getElementById("feedback").innerHTML="✅ Correct";
}else{
document.getElementById("feedback").innerHTML="❌ Incorrect";
}
document.querySelectorAll('input[name="ans"]').forEach(x=>x.disabled=true);
this.style.display="none";
document.getElementById("nextBtn").style.display="inline-block";
};

document.getElementById("nextBtn").onclick=function(){
current++;
if(current<quiz.length){load();}
else{
document.querySelector(".container").innerHTML=`<h1>Quiz Complete</h1><h2>Score: ${score}/${quiz.length}</h2><button onclick="location.reload()">Restart Quiz</button>`;
}
};

load();
</script>
</body>
</html>
